[project]
name = "openclaw-home"
version = "0.0.0"
description = "Harry's OpenClaw home"
readme = "README.md"
requires-python = ">=3.14"
dependencies = []

[tool.uv]
package = true

[dependency-groups]
dev = ["pyright>=1.1.408", "ruff>=0.15.8"]

[tool.pyright]
typeCheckingMode = "strict"
reportImplicitOverride = true
include = ["src/**/*.py"]

[tool.ruff]
target-version = "py314"
include = ["src/**/*.py"]

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D"]
