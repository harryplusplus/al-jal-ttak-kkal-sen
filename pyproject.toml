[project]
name = "openclaw-home"
version = "0.0.0"
description = "Harry's OpenClaw home"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
openclaw-home = "openclaw_home.cli:main"

[tool.uv]
package = true

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "ruff>=0.15.8",
]

[tool.pyright]
typeCheckingMode = "strict"
include = ["src/**/*.py"]

[tool.ruff]
target-version = "py311"
include = ["src/**/*.py"]

[tool.ruff.lint]
select = ["ALL"]
ignore = ["COM812", "COM819", "D", "EM101", "EM102", "TRY003", "S603", "S607"]
