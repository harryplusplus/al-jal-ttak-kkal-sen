database:
  provider: falkordb

server:
  transport: "http"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: openai
  model: glm-5.1:cloud

  providers:
    openai:
      api_key: ollama
      api_url: http://host.docker.internal:11434/v1

embedder:
  provider: openai
  model: nomic-embed-text-v2-moe

  providers:
    openai:
      api_key: ollama
      api_url: http://host.docker.internal:11434/v1

graphiti:
  group_id: openclaw
  user_id: openclaw
